<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
  let db, fns;
  let currentUser = null;
  let allMotoristas = [];
  let allFretes = [];
  let allNotifs = [];
  let csvRows = [];

  function waitDB(cb) {
    if (window._dbReady) { db = window._db; fns = window._fns; cb(); }
    else document.addEventListener('db-ready', () => { db = window._db; fns = window._fns; cb(); });
  }

  waitDB(() => {
    document.getElementById('loading-screen').style.display = 'none';
    showPage('login');
    verificarPrimeiroAcesso();
  });

  async function verificarPrimeiroAcesso() {
    try {
      const snap = await fns.getDocs(fns.collection(db, 'motoristas'));
      if (snap.empty) {
        await fns.setDoc(fns.doc(db, 'config', 'admin'), { usuario: 'admin', senha: 'admin123' });
      }
    } catch(e) { console.log(e.message); }
  }

  function showPage(p) {
    document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
    document.getElementById('page-' + p).classList.add('active');
  }

  function showAlert(id, msg, type) {
    const el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
    setTimeout(() => { el.innerHTML = ''; }, 3500);
  }

  function setBtnLoading(id, loading, label) {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.disabled = loading;
    btn.innerHTML = loading ? `<span class="spinner"></span> Aguarde...` : label;
  }

  function fmtBRL(v) { return 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function fmtData(d) { return d ? d.split('-').reverse().join('/') : '—'; }
  function initials(nome) { return nome.split(' ').map(x => x[0]).slice(0, 2).join('').toUpperCase(); }
  function today() { return new Date().toISOString().slice(0, 10); }
  function mesAtual() { return new Date().toISOString().slice(0, 7); }

  // ── LOGIN ──
  async function doLogin() {
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value;
    if (!u || !p) { showAlert('login-alert', 'Preencha usuário e senha.', 'err'); return; }
    setBtnLoading('btn-login', true, 'Entrar');
    try {
      const adminDoc = await fns.getDoc(fns.doc(db, 'config', 'admin'));
      if (adminDoc.exists()) {
        const a = adminDoc.data();
        if (u === a.usuario && p === a.senha) {
          currentUser = { role: 'gerente' };
          setBtnLoading('btn-login', false, 'Entrar');
          await carregarDados();
          showPage('gerente');
          initGerente();
          return;
        }
      }
      const snap = await fns.getDocs(fns.query(fns.collection(db, 'motoristas'), fns.where('usuario', '==', u)));
      if (!snap.empty) {
        const motDoc = snap.docs[0];
        const mot = { id: motDoc.id, ...motDoc.data() };
        if (mot.senha === p) {
          currentUser = { role: 'motorista', mot };
          setBtnLoading('btn-login', false, 'Entrar');
          await carregarDados();
          showPage('motorista');
          initMotorista(mot);
          return;
        }
      }
      showAlert('login-alert', 'Usuário ou senha incorretos.', 'err');
    } catch(e) { showAlert('login-alert', 'Erro de conexão: ' + e.message, 'err'); }
    setBtnLoading('btn-login', false, 'Entrar');
  }

  function logout() {
    currentUser = null; allFretes = []; allNotifs = [];
    document.getElementById('login-user').value = '';
    document.getElementById('login-pass').value = '';
    showPage('login');
  }

  async function carregarDados() {
    const [mSnap, fSnap, nSnap] = await Promise.all([
      fns.getDocs(fns.collection(db, 'motoristas')),
      fns.getDocs(fns.collection(db, 'fretes')),
      fns.getDocs(fns.collection(db, 'notificacoes'))
    ]);
    allMotoristas = mSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    allFretes = fSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    allFretes.sort((a, b) => b.data.localeCompare(a.data));
    allNotifs = nSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  }

  // ── NOTIFICAÇÕES ──
  function checkNotifs(motId) {
    const minhas = allNotifs.filter(n => n.motId === motId && !n.lida);
    const dot = document.getElementById('notif-count');
    if (minhas.length > 0) { dot.style.display = 'inline-block'; }
    else { dot.style.display = 'none'; }
  }

  function verNotificacoes() {
    const mot = currentUser.mot;
    const painel = document.getElementById('notif-painel');
    const lista = document.getElementById('notif-lista');
    const minhas = allNotifs.filter(n => n.motId === mot.id).sort((a,b) => b.criadoEm.localeCompare(a.criadoEm));
    if (!minhas.length) { lista.innerHTML = '<p style="font-size:13px;color:var(--text-sec)">Nenhuma notificação.</p>'; }
    else {
      lista.innerHTML = minhas.map(n => `
        <div style="padding:8px 0;border-bottom:0.5px solid var(--border);display:flex;gap:8px;align-items:flex-start">
          <span style="width:8px;height:8px;border-radius:50%;background:${n.lida ? 'var(--border-med)' : 'var(--red-brand)'};flex-shrink:0;margin-top:5px;display:inline-block"></span>
          <div style="flex:1">
            <div style="font-size:13px">${n.mensagem}</div>
            <div style="font-size:11px;color:var(--text-sec);margin-top:2px">${fmtData(n.criadoEm ? n.criadoEm.slice(0,10) : '')}</div>
          </div>
        </div>`).join('');
    }
    painel.style.display = painel.style.display === 'none' ? 'block' : 'none';
    // marcar como lidas
    minhas.filter(n => !n.lida).forEach(async n => {
      await fns.updateDoc(fns.doc(db, 'notificacoes', n.id), { lida: true });
      const f = allNotifs.find(x => x.id === n.id);
      if (f) f.lida = true;
    });
    document.getElementById('notif-count').style.display = 'none';
  }

  async function criarNotificacao(motId, mensagem) {
    try {
      const ref = await fns.addDoc(fns.collection(db, 'notificacoes'), { motId, mensagem, lida: false, criadoEm: new Date().toISOString() });
      allNotifs.push({ id: ref.id, motId, mensagem, lida: false, criadoEm: new Date().toISOString() });
    } catch(e) { console.error('Notif error:', e); }
  }

  // ── MOTORISTA ──
  function initMotorista(mot) {
    document.getElementById('mot-nome').textContent = mot.nome;
    document.getElementById('mot-avatar').textContent = initials(mot.nome);
    const mes = mesAtual();
    const mesFretes = allFretes.filter(f => f.motId === mot.id && f.data.startsWith(mes));
    document.getElementById('mot-total-mes').textContent = fmtBRL(mesFretes.reduce((s, f) => s + f.valor, 0));
    document.getElementById('mot-qtd-mes').textContent = mesFretes.length;
    const pend = allFretes.filter(f => f.motId === mot.id && f.status === 'pendente').reduce((s, f) => s + f.valor, 0);
    document.getElementById('mot-pend').textContent = fmtBRL(pend);
    const fim = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).toISOString().slice(0, 10);
    document.getElementById('mot-de').value = mes + '-01';
    document.getElementById('mot-ate').value = fim;
    checkNotifs(mot.id);
    renderMotFretes();
  }

  function renderMotFretes() {
    const mot = currentUser.mot;
    const de = document.getElementById('mot-de').value;
    const ate = document.getElementById('mot-ate').value;
    const st = document.getElementById('mot-st').value;
    let fretes = allFretes.filter(f => f.motId === mot.id);
    if (de) fretes = fretes.filter(f => f.data >= de);
    if (ate) fretes = fretes.filter(f => f.data <= ate);
    if (st) fretes = fretes.filter(f => f.status === st);
    const total = fretes.reduce((s, f) => s + f.valor, 0);
    const el = document.getElementById('mot-tabela');
    if (!fretes.length) { el.innerHTML = '<p style="text-align:center;color:var(--text-sec);padding:1.5rem;font-size:13px">Nenhum frete encontrado.</p>'; return; }
    let h = '<div class="overflow-x"><table><thead><tr><th>Data</th><th>Rota</th><th>Valor</th><th>Status</th><th>Obs</th></tr></thead><tbody>';
    fretes.forEach(f => {
      const badge = f.status === 'pago' ? 'badge-ok' : 'badge-pend';
      const label = f.status === 'pago' ? 'Pago' : 'Pendente';
      h += `<tr><td style="white-space:nowrap">${fmtData(f.data)}</td><td style="white-space:nowrap">${f.origem} → ${f.destino}</td><td style="white-space:nowrap;font-weight:500">${fmtBRL(f.valor)}</td><td><span class="badge ${badge}">${label}</span></td><td style="color:var(--text-sec);font-size:12px">${f.obs || '—'}</td></tr>`;
    });
    h += `</tbody><tfoot><tr><td colspan="2" style="padding:8px 10px;font-size:12px;color:var(--text-sec)">Total filtrado</td><td style="padding:8px 10px;font-weight:500">${fmtBRL(total)}</td><td colspan="2"></td></tr></tfoot></table></div>`;
    el.innerHTML = h;
  }

  function limparFiltroMot() {
    document.getElementById('mot-de').value = '';
    document.getElementById('mot-ate').value = '';
    document.getElementById('mot-st').value = '';
    renderMotFretes();
  }

  // ── GERENTE ──
  function initGerente() {
    populateSelects();
    document.getElementById('l-data').value = today();
    renderListaMotoristas();
    renderRelatorio();
  }

  function populateSelects() {
    ['l-mot', 'r-mot', 'e-mot'].forEach(id => {
      const sel = document.getElementById(id);
      if (!sel) return;
      const isRel = id === 'r-mot';
      sel.innerHTML = isRel ? '<option value="">Todos</option>' : '<option value="">Selecione...</option>';
      allMotoristas.forEach(m => { sel.innerHTML += `<option value="${m.id}">${m.nome}</option>`; });
    });
  }

  function switchTab(t) {
    ['lancar','importar','motoristas','relatorio'].forEach(x => {
      document.getElementById('tab-' + x).style.display = x === t ? 'block' : 'none';
    });
    document.querySelectorAll('.tab-bar .tab').forEach((btn, i) => {
      btn.classList.toggle('active', ['lancar','importar','motoristas','relatorio'][i] === t);
    });
    if (t === 'motoristas') renderListaMotoristas();
    if (t === 'relatorio') renderRelatorio();
  }

  async function lancarFrete() {
    const motId = document.getElementById('l-mot').value;
    const data = document.getElementById('l-data').value;
    const origem = document.getElementById('l-orig').value.trim();
    const destino = document.getElementById('l-dest').value.trim();
    const valor = parseFloat(document.getElementById('l-val').value);
    const status = document.getElementById('l-st').value;
    const obs = document.getElementById('l-obs').value.trim();
    if (!motId || !data || !origem || !destino || isNaN(valor) || valor <= 0) {
      showAlert('lancar-alert', 'Preencha todos os campos obrigatórios.', 'err'); return;
    }
    setBtnLoading('btn-lancar', true, 'Salvar frete');
    try {
      const ref = await fns.addDoc(fns.collection(db, 'fretes'), { motId, data, origem, destino, valor, status, obs, criadoEm: new Date().toISOString() });
      allFretes.unshift({ id: ref.id, motId, data, origem, destino, valor, status, obs });
      allFretes.sort((a, b) => b.data.localeCompare(a.data));
      const mot = allMotoristas.find(m => m.id === motId);
      const nomeMot = mot ? mot.nome : 'você';
      await criarNotificacao(motId, `Novo frete lançado: ${origem} → ${destino} em ${fmtData(data)} — ${fmtBRL(valor)} (${status})`);
      showAlert('lancar-alert', 'Frete lançado e motorista notificado!', 'ok');
      limparLancar();
    } catch(e) { showAlert('lancar-alert', 'Erro ao salvar: ' + e.message, 'err'); }
    setBtnLoading('btn-lancar', false, 'Salvar frete');
  }

  function limparLancar() {
    ['l-mot','l-orig','l-dest','l-val','l-obs'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('l-data').value = today();
    document.getElementById('l-st').value = 'pendente';
  }

  // ── EDITAR / EXCLUIR ──
  function abrirModal(freteId) {
    const f = allFretes.find(x => x.id === freteId);
    if (!f) return;
    document.getElementById('e-id').value = f.id;
    document.getElementById('e-data').value = f.data;
    document.getElementById('e-orig').value = f.origem;
    document.getElementById('e-dest').value = f.destino;
    document.getElementById('e-val').value = f.valor;
    document.getElementById('e-st').value = f.status;
    document.getElementById('e-obs').value = f.obs || '';
    populateSelects();
    document.getElementById('e-mot').value = f.motId;
    document.getElementById('modal-editar').classList.add('open');
  }

  function fecharModal() {
    document.getElementById('modal-editar').classList.remove('open');
    document.getElementById('edit-alert').innerHTML = '';
  }

  async function salvarEdicao() {
    const id = document.getElementById('e-id').value;
    const motId = document.getElementById('e-mot').value;
    const data = document.getElementById('e-data').value;
    const origem = document.getElementById('e-orig').value.trim();
    const destino = document.getElementById('e-dest').value.trim();
    const valor = parseFloat(document.getElementById('e-val').value);
    const status = document.getElementById('e-st').value;
    const obs = document.getElementById('e-obs').value.trim();
    if (!motId || !data || !origem || !destino || isNaN(valor) || valor <= 0) {
      showAlert('edit-alert', 'Preencha todos os campos.', 'err'); return;
    }
    setBtnLoading('btn-salvar-edit', true, 'Salvar');
    try {
      await fns.updateDoc(fns.doc(db, 'fretes', id), { motId, data, origem, destino, valor, status, obs });
      const f = allFretes.find(x => x.id === id);
      if (f) Object.assign(f, { motId, data, origem, destino, valor, status, obs });
      allFretes.sort((a, b) => b.data.localeCompare(a.data));
      fecharModal();
      renderRelatorio();
    } catch(e) { showAlert('edit-alert', 'Erro: ' + e.message, 'err'); }
    setBtnLoading('btn-salvar-edit', false, 'Salvar');
  }

  async function excluirFrete() {
    const id = document.getElementById('e-id').value;
    if (!confirm('Excluir este frete permanentemente?')) return;
    try {
      await fns.deleteDoc(fns.doc(db, 'fretes', id));
      allFretes = allFretes.filter(x => x.id !== id);
      fecharModal();
      renderRelatorio();
    } catch(e) { alert('Erro ao excluir: ' + e.message); }
  }

  document.getElementById('modal-editar').addEventListener('click', function(e) {
    if (e.target === this) fecharModal();
  });

  // ── MOTORISTAS ──
  async function cadastrarMotorista() {
    const nome = document.getElementById('m-nome').value.trim();
    const usuario = document.getElementById('m-user').value.trim().toLowerCase().replace(/\s/g, '');
    const senha = document.getElementById('m-pass').value;
    const tel = document.getElementById('m-tel').value.trim();
    if (!nome || !usuario || senha.length < 4) { showAlert('cad-alert', 'Preencha nome, usuário e senha (mín. 4 caracteres).', 'err'); return; }
    if (allMotoristas.find(m => m.usuario === usuario)) { showAlert('cad-alert', 'Esse usuário já existe.', 'err'); return; }
    setBtnLoading('btn-cad', true, 'Cadastrar');
    try {
      const ref = await fns.addDoc(fns.collection(db, 'motoristas'), { nome, usuario, senha, tel, criadoEm: new Date().toISOString() });
      allMotoristas.push({ id: ref.id, nome, usuario, senha, tel });
      populateSelects();
      renderListaMotoristas();
      ['m-nome','m-user','m-pass','m-tel'].forEach(id => document.getElementById(id).value = '');
      showAlert('cad-alert', 'Motorista cadastrado!', 'ok');
    } catch(e) { showAlert('cad-alert', 'Erro: ' + e.message, 'err'); }
    setBtnLoading('btn-cad', false, 'Cadastrar');
  }

  function renderListaMotoristas() {
    const el = document.getElementById('lista-mot');
    if (!allMotoristas.length) { el.innerHTML = '<p style="color:var(--text-sec);font-size:13px">Nenhum motorista cadastrado.</p>'; return; }
    let h = '<div class="overflow-x"><table><thead><tr><th>Nome</th><th>Usuário</th><th>Telefone</th><th>Fretes</th><th></th></tr></thead><tbody>';
    allMotoristas.forEach(m => {
      const qtd = allFretes.filter(f => f.motId === m.id).length;
      h += `<tr><td>${m.nome}</td><td style="font-family:monospace;font-size:12px">${m.usuario}</td><td style="font-size:12px">${m.tel || '—'}</td><td>${qtd}</td><td><button onclick="removerMotorista('${m.id}')" style="font-size:11px;padding:3px 8px;color:var(--red-brand);border-color:var(--red-light)">Remover</button></td></tr>`;
    });
    h += '</tbody></table></div>';
    el.innerHTML = h;
  }

  async function removerMotorista(id) {
    if (!confirm('Remover motorista?')) return;
    try {
      await fns.deleteDoc(fns.doc(db, 'motoristas', id));
      allMotoristas = allMotoristas.filter(m => m.id !== id);
      populateSelects();
      renderListaMotoristas();
    } catch(e) { alert('Erro: ' + e.message); }
  }

  // ── RELATÓRIO ──
  function renderRelatorio() {
    const de = document.getElementById('r-de').value;
    const ate = document.getElementById('r-ate').value;
    const motId = document.getElementById('r-mot').value;
    let fretes = [...allFretes];
    if (de) fretes = fretes.filter(f => f.data >= de);
    if (ate) fretes = fretes.filter(f => f.data <= ate);
    if (motId) fretes = fretes.filter(f => f.motId === motId);
    const pago = fretes.filter(f => f.status === 'pago').reduce((s, f) => s + f.valor, 0);
    const pend = fretes.filter(f => f.status === 'pendente').reduce((s, f) => s + f.valor, 0);
    document.getElementById('r-pago').textContent = fmtBRL(pago);
    document.getElementById('r-pend').textContent = fmtBRL(pend);
    document.getElementById('r-qtd').textContent = fretes.length;
    const el = document.getElementById('rel-tabela');
    if (!fretes.length) { el.innerHTML = '<p style="text-align:center;color:var(--text-sec);padding:1.5rem;font-size:13px">Nenhum frete no período.</p>'; return; }
    let h = '<div class="overflow-x"><table><thead><tr><th>Data</th><th>Motorista</th><th>Rota</th><th>Valor</th><th>Status</th><th>Ações</th></tr></thead><tbody>';
    fretes.forEach(f => {
      const mot = allMotoristas.find(m => m.id === f.motId);
      const nome = mot ? mot.nome.split(' ')[0] : '(removido)';
      const badge = f.status === 'pago' ? 'badge-ok' : 'badge-pend';
      const label = f.status === 'pago' ? 'Pago' : 'Pendente';
      const btnStatus = f.status === 'pago' ? '↩ Pendente' : '✓ Pago';
      h += `<tr>
        <td style="white-space:nowrap">${fmtData(f.data)}</td>
        <td>${nome}</td>
        <td style="white-space:nowrap;font-size:12px">${f.origem} → ${f.destino}</td>
        <td style="white-space:nowrap;font-weight:500">${fmtBRL(f.valor)}</td>
        <td><span class="badge ${badge}">${label}</span></td>
        <td style="white-space:nowrap;display:flex;gap:4px">
          <button onclick="toggleStatus('${f.id}')" style="font-size:11px;padding:3px 8px">${btnStatus}</button>
          <button onclick="abrirModal('${f.id}')" style="font-size:11px;padding:3px 8px">Editar</button>
        </td>
      </tr>`;
    });
    h += '</tbody></table></div>';
    el.innerHTML = h;
  }

  async function toggleStatus(id) {
    const f = allFretes.find(x => x.id === id);
    if (!f) return;
    const novoStatus = f.status === 'pago' ? 'pendente' : 'pago';
    try {
      await fns.updateDoc(fns.doc(db, 'fretes', id), { status: novoStatus });
      f.status = novoStatus;
      renderRelatorio();
    } catch(e) { alert('Erro: ' + e.message); }
  }

  // ── PDF ──
  function exportarPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const de = document.getElementById('r-de').value;
    const ate = document.getElementById('r-ate').value;
    const motId = document.getElementById('r-mot').value;
    let fretes = [...allFretes];
    if (de) fretes = fretes.filter(f => f.data >= de);
    if (ate) fretes = fretes.filter(f => f.data <= ate);
    if (motId) fretes = fretes.filter(f => f.motId === motId);

    const pago = fretes.filter(f => f.status === 'pago').reduce((s, f) => s + f.valor, 0);
    const pend = fretes.filter(f => f.status === 'pendente').reduce((s, f) => s + f.valor, 0);
    const nomeMot = motId ? (allMotoristas.find(m => m.id === motId)?.nome || '') : 'Todos os motoristas';

    doc.setFontSize(18); doc.setFont('helvetica', 'bold');
    doc.text('ANDRADE LOGÍSTICA', 105, 18, { align: 'center' });
    doc.setFontSize(11); doc.setFont('helvetica', 'normal');
    doc.text('Relatório de Fretes', 105, 25, { align: 'center' });

    doc.setDrawColor(200); doc.line(14, 28, 196, 28);

    doc.setFontSize(10);
    doc.text(`Motorista: ${nomeMot}`, 14, 35);
    doc.text(`Período: ${de ? fmtData(de) : 'início'} até ${ate ? fmtData(ate) : 'hoje'}`, 14, 41);
    doc.text(`Gerado em: ${new Date().toLocaleDateString('pt-BR')} às ${new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'})}`, 14, 47);

    doc.setFillColor(240, 240, 240); doc.rect(14, 52, 55, 14, 'F');
    doc.setFillColor(240, 240, 240); doc.rect(72, 52, 55, 14, 'F');
    doc.setFillColor(240, 240, 240); doc.rect(130, 52, 66, 14, 'F');
    doc.setFontSize(8); doc.setTextColor(100);
    doc.text('TOTAL PAGO', 41, 57, { align: 'center' });
    doc.text('TOTAL PENDENTE', 99, 57, { align: 'center' });
    doc.text('QTD. FRETES', 163, 57, { align: 'center' });
    doc.setFontSize(11); doc.setTextColor(0); doc.setFont('helvetica', 'bold');
    doc.text(fmtBRL(pago), 41, 63, { align: 'center' });
    doc.text(fmtBRL(pend), 99, 63, { align: 'center' });
    doc.text(String(fretes.length), 163, 63, { align: 'center' });

    doc.setFont('helvetica', 'bold'); doc.setFontSize(9);
    let y = 76;
    doc.setFillColor(220,220,220); doc.rect(14, y-4, 182, 7, 'F');
    doc.text('Data', 16, y); doc.text('Motorista', 36, y); doc.text('Origem → Destino', 72, y);
    doc.text('Valor', 138, y); doc.text('Status', 163, y);

    doc.setFont('helvetica', 'normal'); doc.setFontSize(8.5);
    fretes.forEach((f, i) => {
      y += 7;
      if (y > 270) { doc.addPage(); y = 20; }
      if (i % 2 === 0) { doc.setFillColor(250, 250, 250); doc.rect(14, y-4, 182, 7, 'F'); }
      const mot = allMotoristas.find(m => m.id === f.motId);
      const nome = mot ? mot.nome.split(' ')[0] : '—';
      doc.text(fmtData(f.data), 16, y);
      doc.text(nome, 36, y);
      const rota = `${f.origem} → ${f.destino}`;
      doc.text(rota.length > 28 ? rota.slice(0,26)+'…' : rota, 72, y);
      doc.text(fmtBRL(f.valor), 138, y);
      if (f.status === 'pago') { doc.setTextColor(40, 110, 17); } else { doc.setTextColor(100, 60, 0); }
      doc.text(f.status === 'pago' ? 'Pago' : 'Pendente', 163, y);
      doc.setTextColor(0);
    });

    doc.setDrawColor(200); doc.line(14, y+5, 196, y+5);
    doc.setFontSize(8); doc.setTextColor(150);
    doc.text('Andrade Logística — Sistema de Controle de Fretes', 105, y+10, { align: 'center' });

    const periodo = de && ate ? `${de}_${ate}` : 'completo';
    doc.save(`andrade_fretes_${periodo}.pdf`);
  }

  // ── CSV ──
  function previewCSV(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      const lines = ev.target.result.trim().split('\n');
      csvRows = [];
      const header = lines[0].split(',').map(x => x.trim().toLowerCase());
      const ci = { motorista: header.indexOf('motorista'), data: header.indexOf('data'), origem: header.indexOf('origem'), destino: header.indexOf('destino'), valor: header.indexOf('valor'), status: header.indexOf('status') };
      let erros = 0;
      for (let i = 1; i < lines.length; i++) {
        const p = lines[i].split(',').map(x => x.trim());
        if (p.length < 4) continue;
        const nomeMot = p[ci.motorista] || '';
        const mot = allMotoristas.find(m => m.nome.toLowerCase() === nomeMot.toLowerCase());
        if (!mot) erros++;
        csvRows.push({ ok: !!mot, nomeMot, motId: mot ? mot.id : null, data: p[ci.data] || '', origem: p[ci.origem] || '', destino: p[ci.destino] || '', valor: parseFloat((p[ci.valor] || '0').replace(',', '.')), status: (p[ci.status] || 'pendente').toLowerCase() });
      }
      let h = `<p style="font-size:13px;margin-bottom:8px;color:var(--text-sec)">${csvRows.length} registros${erros ? ` — <span style="color:var(--red-brand)">${erros} motorista(s) não encontrado(s)</span>` : ''}</p>`;
      h += '<div class="overflow-x"><table><thead><tr><th>Motorista</th><th>Data</th><th>Rota</th><th>Valor</th><th>Status</th><th></th></tr></thead><tbody>';
      csvRows.forEach(r => {
        h += `<tr><td>${r.nomeMot}</td><td>${r.data}</td><td style="font-size:12px">${r.origem} → ${r.destino}</td><td>${fmtBRL(r.valor)}</td><td style="font-size:12px">${r.status}</td><td><span class="badge ${r.ok ? 'badge-ok' : 'badge-err'}">${r.ok ? 'OK' : 'Erro'}</span></td></tr>`;
      });
      h += '</tbody></table></div>';
      document.getElementById('csv-preview').innerHTML = h;
      document.getElementById('btn-import').style.display = csvRows.filter(r => r.ok).length > 0 ? 'inline-block' : 'none';
    };
    reader.readAsText(file);
  }

  async function importarCSV() {
    const validos = csvRows.filter(r => r.ok && r.data && r.origem && r.destino && !isNaN(r.valor) && r.valor > 0);
    setBtnLoading('btn-import', true, 'Importar registros');
    try {
      for (const r of validos) {
        const ref = await fns.addDoc(fns.collection(db, 'fretes'), { motId: r.motId, data: r.data, origem: r.origem, destino: r.destino, valor: r.valor, status: r.status, obs: '', criadoEm: new Date().toISOString() });
        allFretes.unshift({ id: ref.id, ...r });
        await criarNotificacao(r.motId, `Novo frete lançado via planilha: ${r.origem} → ${r.destino} em ${fmtData(r.data)} — ${fmtBRL(r.valor)}`);
      }
      allFretes.sort((a, b) => b.data.localeCompare(a.data));
      showAlert('csv-alert', `${validos.length} fretes importados com sucesso!`, 'ok');
      document.getElementById('csv-preview').innerHTML = '';
      document.getElementById('csv-file').value = '';
      csvRows = [];
    } catch(e) { showAlert('csv-alert', 'Erro: ' + e.message, 'err'); }
    setBtnLoading('btn-import', false, 'Importar registros');
  }

  function baixarModelo() {
    const csv = 'motorista,data,origem,destino,valor,status\nJoão Silva,2026-04-13,Recife,Caruaru,320.00,pago\nMaria Souza,2026-04-13,Recife,Natal,580.00,pendente';
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    a.download = 'modelo_fretes.csv';
    a.click();
  }

  ['login-user', 'login-pass'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  });
</script>
